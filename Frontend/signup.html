<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AI Study Assistant</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">

    <div class="login-box">

        <h2>Create Account 🚀</h2>

        <p>
            Sign up to start using AI Study Assistant
        </p>

        <input
            type="email"
            id="email"
            placeholder="Enter Email"
        >

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
        >

        <button
            class="login-btn"
            onclick="signupUser()"
        >
            Sign Up
        </button>

        <p class="signup-text">

            Already have an account?

            <a href="login.html">
                Login
            </a>

        </p>

    </div>

</div>

<script type="module" src="signup.js"></script>

</body>
</html>
